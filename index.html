lor:l.muted,marginTop:4},children:"Add multiples of 12 if result goes negative"})]})]}),r.jsxs("p",{style:{...M,fontSize:13},children:["If the result is 0, the clock reads ",r.jsx(q,{children:"12"})," (not 0 — clocks don't show zero!)."]})]})},{title:"(i) 80 hours after 11:00",body:r.jsxs("div",{children:[r.jsx("div",{style:{background:"#080a0f",border:`1px solid ${l.border}`,borderRadius:10,padding:"18px 22px"},children:r.jsx("pre",{style:{..._,fontSize:13,lineHeight:1.9,color:"#a8b0c8",margin:0,whiteSpace:"pre-wrap"},children:`(11 + 80) mod 12

= [F ∨ (¬p ∧ q)] → q           [Complement: ¬p ∧ p = F]
= (¬p ∧ q) → q                 [Identity: F ∨ x = x]

.jsx(q,{children:"statement"})," with a definite TRUE/FALSE value. If any variable is ",r.jsx(q,{children:"free"})," (unbound) → it is a ",r.jsx(q,{children:"propositional function"}),"; find which x values make it true (the truth set)."]}),r.jsxs("p",{style:M,children:["A = ","{1,2,...,10}",". Maximum possible x+y = 10+10 = 20. Minimum = 1+1 = 2."]})]})},{title:"(i) (∀x∈A)(∃y∈A)(x+y<14) — both bound",body:r.jsx("div",{children:r.jsxs("p",{style:M,children:[r.jsx(q,{children:"Statement."})," Test the hardest case: x=10 (largest). Can we find y∈A with 10+y<14? Try y=1: 10+1=11<14. ✓ For ANY x, y=1 always works since x+1 ≤ 11 < 14. ",r.jsx(q,{col:l.green,children:"TRUE ✓"})]})})},{title:"(ii) (∀y∈A)(x+y<14) — x is FREE",body:r.jsxs("div",{children:[r.jsxs("p",{style:M,children:[r.jsx(q,{children:"Propositional function"})," in x. We need x+y<14 for ALL y, including y=10 (worst case). Need x+10<14 → x<4 → x≤3."]}),r.jsx("div",{style:{background:"#080a0f",border:`1px solid ${l.border}`,borderRadius:10,padding:"14px 20px"},children:r.jsx("pre",{style:{..._,fontSize:13,lineHeight:1.9,color:"#a8b0c8",margin:0},children:`x=1: 1+10=11<14 ✓ (works for all y)

s FALSE, the conditional is vacuously TRUE — the hypothesis was never triggered, so the promise can never be broken."},{text:"p=TRUE, q=TRUE",correct:!1,explanation:"Wrong. When both are TRUE the conditional is TRUE — the promise was made and kept."},{text:"p=TRUE, q=FALSE",correct:!0,explanation:"✅ Correct! p→q is FALSE ONLY when p=TRUE and q=FALSE. The hypothesis was triggered (p is true) but the conclusion failed (q is false) — the promise was broken. This is the single false row in the truth table."},{text:"p=FALSE, q=TRUE",correct:!1,explanation:"Wrong. When p=FALSE the conditional is vacuously TRUE. A false hypothesis means the promise was never triggered, so it cannot be broken."}]},{id:"l2",topic:"Logic",difficulty:"Hard",marks:3,question:"Using De Morgan's law, which expression is logically equivalent to ¬(p ∧ ¬q)?",options:[{text:"¬p ∧ q",correct:!1,explanation:"Wrong. De Morgan's: ¬(A∧B) ≡ ¬A∨¬B. Here A=p, B=¬q. So ¬(p∧¬q) ≡ ¬p ∨ ¬(¬q) ≡ ¬p ∨ q. The connective should be ∨, not ∧."},{text:"¬p ∨ q",correct:!0,explanation:`✅ Correct! De Morgan's: ¬(A∧B) ≡ ¬A∨¬B. With A=p, B=¬q: ¬(p∧¬q) ≡ ¬p ∨ ¬(¬q) ≡ ¬p ∨ q. Bonus insight: ¬p∨q ≡ p→q, so "not (p and not q)" means the same as "p implies q"!`},{text:"p ∨ ¬q",correct:!1,explanation:"Wrong. p∨¬q = ¬(¬p∧q) by De Morgan's — that's a different expression. The original ¬(p∧¬q) correctly gives ¬p∨q."},{text:"¬p ∧ ¬q",correct:!1,explanation:"Wrong. ¬p∧¬q ≡ ¬(p∨q) — the negation of a DISJUNCTION. The original negates a conjunction ¬(p∧¬q), which gives ¬p∨q."}]},{id:"l3",topic:"Logic",difficulty:"Hard",marks:3,question:"Which proposition is a TAUTOLOGY (always TRUE)?",options:[{text:"p ∧ ¬p",correct:!1,explanation:"Wrong. This is a CONTRADICTION — always FALSE. p and ¬p cannot both be true simultaneously."},{text:"p → (q → p)",correct:!0,explanation:"✅ Correct! Always TRUE. If p=T: q→p is T (since p=T). So T→T=T. If p=F: p→(q→p) is T (false antecedent → vacuously true). Check all 4 rows: TT→T, TF→T, FT→T, FF→T. Always TRUE."},{text:"p ∨ q",correct:!1,explanation:"Wrong. This is a CONTINGENCY — FALSE when both p=FALSE and q=FALSE. Not always true."},{text:"p ↔ ¬p",correct:!1,explanation:"Wrong. This is a CONTRADICTION — always FALSE. p and ¬p always have opposite values, so they can never be equal (↔ requires same truth value)."}]},{id:"l4",topic:"Logic",difficulty:"Medium",marks:2,question:"What is the contrapositive of p → q?",options:[{text:"q → p (the converse)",correct:!1,explanation:"Wrong. The converse is q→p — NOT equivalent to the original. Only the contrapositive is logically equivalent."},{text:"¬p → ¬q (the inverse)",correct:!1,explanation:"Wrong. The inverse ¬p→¬q is also NOT equivalent to the original. Interestingly, the inverse equals the converse (both are non-equivalent to the original)."},{text:"¬q → ¬p (the contrapositive)",correct:!0,explanation:'✅ Correct! The contrapositive of p→q is ¬q→¬p — always logically equivalent to the original. "If not q then not p." This is the KEY equivalence used in indirect proofs.'},{text:"¬p → q",correct:!1,explanation:"Wrong. ¬p→q is a different conditional that has no standard name and is not equivalent to p→q."}]},{id:"l5",topic:"Logic",difficulty:"Medium",marks:2,question:"The compound proposition [¬p ∧ (p ∨ q)] → q simplifies to:",options:[{text:"A contradiction (always FALSE)",correct:!1,explanation:"Wrong. A contradiction is always false. Let's test: p=F, q=T → [T∧(F∨T)]→T = [T∧T]→T = T. Not always false."},{text:"A tautology (always TRUE)",correct:!0,explanation:"✅ Correct! Simplify: ¬p∧(p∨q) = (¬p∧p)∨(¬p∧q) = F∨(¬p∧q) = (¬p∧q). So the expression becomes (¬p∧q)→q ≡ ¬(¬p∧q)∨q ≡ (p∨¬q)∨q ≡ p∨(¬q∨q) ≡ p∨T ≡ T. Always TRUE!"},{text:"A contingency (sometimes TRUE, sometimes FALSE)",correct:!1,explanation:"Wrong. Working through the equivalences: the expression simplifies all the way to T (always true). It is a tautology."},{text:"Equivalent to p ∧ q",correct:!1,explanation:"Wrong. p∧q has mixed truth values (T, F, F, F). This expression is always TRUE — they are not equivalent."}]},{id:"p1",topic:"Predicate Logic",difficulty:"Medium",marks:2,question:'Which correctly translates "All CS students know Python"? Let C(x)="x is a CS student", K(x)="x knows Python".',options:[{text:"∀x (C(x) ∧ K(x))",correct:!1,explanation:'Wrong. ∀x(C(x)∧K(x)) says "everything is a CS student AND knows Python" — including chairs and buildings. Use → to restrict the claim to CS students only.'},{text:"∀x (C(x) → K(x))",correct:!0,explanation:'✅ Correct! "For every x: if x is a CS student, then x knows Python." The universal quantifier always pairs with → when restricting to a subset. This is the standard pattern for "all A are B."'},{text:"∃x (C(x) → K(x))",correct:!1,explanation:'Wrong. ∃ means "there exists" — but the sentence says "ALL students." Also ∃x(C(x)→K(x)) is trivially true for any non-CS-student x since C(x)=F makes C(x)→K(x)=T.'},{text:"∀x (C(x) ∧ ¬K(x))",correct:!1,explanation:'Wrong. This says "everything is a CS student that does NOT know Python" — the opposite of the intended meaning.'}]},{id:"p2",topic:"Predicate Logic",difficulty:"Hard",marks:3,question:"What is the negation of ∀x ∃y P(x,y)?",options:[{text:"∀x ∀y ¬P(x,y)",correct:!1,explanation:"Wrong. The first ∀ was not flipped. Rule: push ¬ through each quantifier, flipping ∀↔∃ each time. ¬(∀x∃y P) → ∃x¬(∃y P) → ∃x∀y¬P."},{text:"∃x ∀y ¬P(x,y)",correct:!0,explanation:"✅ Correct! De Morgan's for quantifiers: ¬(∀x A) ≡ ∃x ¬A, and ¬(∃y B) ≡ ∀y ¬B. So ¬(∀x∃y P(x,y)) ≡ ∃x∀y ¬P(x,y). Both quantifiers flip, predicate is negated."},{text:"∃x ∃y ¬P(x,y)",correct:!1,explanation:"Wrong. Only the first quantifier flipped (∀→∃). The second must also flip: ∃→∀. Correct: ∃x ∀y ¬P(x,y)."},{text:"∀x ∃y ¬P(x,y)",correct:!1,explanation:"Wrong. No quantifiers were flipped — only the predicate was negated. Both quantifiers must flip when negation passes through them."}]},{id:"p3",topic:"Predicate Logic",difficulty:"Hard",marks:3,question:"Over ℤ (integers), which is TRUE: ∀x∃y(x+y=0) vs ∃y∀x(x+y=0)?",options:[{text:"Both are TRUE",correct:!1,explanation:"Wrong. ∃y∀x(x+y=0) is FALSE. It claims ONE fixed y makes x+y=0 for every x simultaneously — impossible (would need y=0 AND y=−1 AND y=−2 at once)."},{text:"∀x∃y(x+y=0) is TRUE, ∃y∀x(x+y=0) is FALSE",correct:!0,explanation:"✅ Correct! ∀x∃y: for each x, choose y=−x. Then x+(−x)=0 ✓ (different y for each x is fine). ∃y∀x: need ONE y that works for ALL x simultaneously — impossible. Order of quantifiers completely changes the meaning!"},{text:"Both are FALSE",correct:!1,explanation:"Wrong. ∀x∃y(x+y=0) is TRUE — for any integer x, simply take y=−x. Different y values are allowed for different x values."},{text:"∃y∀x(x+y=0) is TRUE, ∀x∃y(x+y=0) is FALSE",correct:!1,explanation:"Wrong — exactly backwards. ∃y∀x requires one fixed y for all x (impossible). ∀x∃y allows different y per x (take y=−x always works)."}]},{id:"s1",topic:"Set Theory",difficulty:"Medium",marks:2,question:"If |A| = 4, what is |P(A)|?",options:[{text:"4",correct:!1,explanation:"Wrong. 4 is |A| itself. |P(A)| = 2^|A| = 2^4 = 16."},{text:"8",correct:!1,explanation:"Wrong. 8 = 2³ — correct if |A|=3. Here |A|=4 so |P(A)| = 2^4 = 16."},{text:"16",correct:!0,explanation:"✅ Correct! |P(A)| = 2^|A| = 2^4 = 16. Think of each element with an on/off switch: 2⁴=16 switch configurations. ALWAYS include ∅ and A itself in the count."},{text:"12",correct:!1,explanation:"Wrong. 12 is not a power of 2. Formula: |P(A)| = 2^|A| = 16."}]},{id:"s2",topic:"Set Theory",difficulty:"Hard",marks:3,question:"Which is the correct set identity for A ⊕ B (symmetric difference)?",options:[{text:"A ⊕ B = (A ∩ B) − (A ∪ B)",correct:!1,explanation:"Wrong. A∩B ⊆ A∪B always, so (A∩B)−(A∪B) = ∅. The symmetric difference is not always empty."},{text:"A ⊕ B = (A ∪ B) − (A ∩ B)",correct:!0,explanation:"✅ Correct! A⊕B = (A∪B)−(A∩B). This removes the shared elements from the union, leaving only elements in exactly ONE set. Proof: start from the definition of ⊕, apply De Morgan's to the intersection complement, simplify — exactly what Dr. O's exam question asked you to prove."},{text:"A ⊕ B = A ∪ B",correct:!1,explanation:"Wrong. A∪B includes elements in BOTH A and B. The symmetric difference A⊕B EXCLUDES elements common to both. If A={1,2,3} and B={3,4}, A∪B={1,2,3,4} but A⊕B={1,2,4}."},{text:"A ⊕ B = (A − B) ∩ (B − A)",correct:!1,explanation:"Wrong. A−B and B−A are DISJOINT sets (no common elements), so their intersection is ∅. The correct formula uses UNION: A⊕B = (A−B) ∪ (B−A)."}]},{id:"s3",topic:"Set Theory",difficulty:"Medium",marks:2,question:"Which statement about the empty set ∅ is TRUE?",options:[{text:"∅ is not a subset of any non-empty set",correct:!1,explanation:"Wrong. ∅ is a subset of EVERY set, including non-empty ones. ∅ ⊆ A for all A — vacuously true because there are no elements in ∅ to violate the subset condition."},{text:"|P(∅)| = 0",correct:!1,explanation:"Wrong. P(∅) = {∅} — contains one element (the empty set itself). |P(∅)| = 1 = 2^0 = 2^|∅|. The power set of the empty set is NOT empty."},{text:"∅ ∈ P(A) for every set A",correct:!0,explanation:"✅ Correct! P(A) contains all subsets of A. Since ∅ ⊆ A for every set A, ∅ is always an ELEMENT of P(A). Note distinction: ∅ ⊆ A (subset relation) and ∅ ∈ P(A) (membership relation)."},{text:"A ∩ ∅ = A for any set A",correct:!1,explanation:"Wrong. A∩∅ = ∅, NOT A. Nothing is in ∅, so nothing can be in A AND ∅. The correct identity: A∪∅ = A (union with empty set gives A back)."}]},{id:"s4",topic:"Set Theory",difficulty:"Hard",marks:3,question:"Prove or disprove: if A ⊆ B and B ⊆ C, then A ⊆ C. The correct proof technique is:",options:[{text:"Show a counterexample where A⊆B, B⊆C but A⊄C",correct:!1,explanation:"Wrong approach. This statement IS true, so no counterexample exists. The correct approach is a direct proof using the definition of subset."},{text:"Let x∈A. Since A⊆B, x∈B. Since B⊆C, x∈C. Therefore every element of A is in C, so A⊆C.",correct:!0,explanation:"✅ Correct! This is the element argument — the standard proof technique for subset proofs. Let x be arbitrary in A, chain the subset relations to show x∈C. Since x was arbitrary, every element of A is in C, proving A⊆C. This exact proof appears in Dr. O's Set Theory slides."},{text:"Draw a Venn diagram showing three nested circles",correct:!1,explanation:"Wrong. Venn diagrams build intuition but are not formal proofs. The examiner expects a symbolic proof using the definition A⊆B ⟺ ∀x(x∈A→x∈B)."},{text:"Use the cardinality argument: |A|≤|B|≤|C| implies |A|≤|C|",correct:!1,explanation:"Wrong. Cardinality comparison proves nothing about subset relations. Example: |{1,2}|≤|{3,4}| but {1,2}⊄{3,4}. You need the element argument."}]},{id:"g1",topic:"Graph Theory",difficulty:"Medium",marks:2,question:"A graph has 8 vertices each with degree 3. How many edges does it have?",options:[{text:"24",correct:!1,explanation:"Wrong. 24 is the SUM of all degrees (8×3=24). By Handshaking: |E| = Σdeg(v)/2 = 24/2 = 12."},{text:"12",correct:!0,explanation:"✅ Correct! Handshaking Theorem: Σdeg(v) = 2|E|. Sum = 8×3 = 24. So 2|E|=24 → |E|=12."},{text:"3",correct:!1,explanation:"Wrong. 3 is just the degree of each vertex, not the edge count. Apply Handshaking: Σdeg(v) = 2|E| → 8×3 = 24 = 2|E| → |E|=12."},{text:"This graph cannot exist",correct:!1,explanation:"Wrong. The sum 8×3=24 is EVEN (required by Handshaking). So this graph CAN exist — it is a 3-regular graph on 8 vertices, e.g. the complete bipartite graph K₃,₃ extended."}]},{id:"g2",topic:"Graph Theory",difficulty:"Hard",marks:3,question:"Which is TRUE about K₅ (complete graph on 5 vertices)?",options:[{text:"K₅ is planar",correct:!1,explanation:"Wrong. K₅ is NOT planar — it is one of the two minimal non-planar graphs (Kuratowski's theorem: a graph is planar iff it contains no K₅ or K₃,₃ subdivision). The Four Colour Theorem only applies to planar graphs."},{text:"χ(K₅) = 4",correct:!1,explanation:"Wrong. χ(Kₙ) = n for complete graphs. In K₅ every vertex is adjacent to all others — each needs a unique colour. χ(K₅) = 5."},{text:"K₅ has 10 edges and χ(K₅) = 5",correct:!0,explanation:"✅ Correct! Edges: n(n−1)/2 = 5×4/2 = 10. Chromatic number: χ(Kₙ)=n, so χ(K₅)=5. Every vertex is adjacent to all 4 others — each must get a different colour."},{text:"K₅ has 5 Hamilton circuits",correct:!1,explanation:"Wrong. Hamilton circuits in Kₙ = (n−1)!/2 = 4!/2 = 24/2 = 12. K₅ has 12 distinct Hamilton circuits."}]},{id:"g3",topic:"Graph Theory",difficulty:"Hard",marks:3,question:"A graph has 7 vertices: 3 with degree 4, 2 with degree 3, and 2 with degree 1. Does this graph exist?",options:[{text:"Yes — Handshaking theorem is satisfied",correct:!0,explanation:"✅ Correct! Check: Σdeg = 3(4)+2(3)+2(1) = 12+6+2 = 20. Since 20 is EVEN, 2|E|=20 → |E|=10, a valid integer. The Handshaking condition (even sum of degrees) is satisfied, so the graph is possible."},{text:"No — the sum of degrees is odd",correct:!1,explanation:"Wrong. Σdeg = 3(4)+2(3)+2(1) = 12+6+2 = 20, which is EVEN. By Handshaking, |E|=10 — a valid integer. The graph CAN exist."},{text:"No — vertices of degree 1 cannot coexist with vertices of degree 4",correct:!1,explanation:"Wrong. There is no such restriction. Pendant vertices (degree 1) can exist alongside high-degree vertices in the same graph."},{text:"No — 7 vertices cannot have 10 edges in a simple graph",correct:!1,explanation:"Wrong. A simple graph on 7 vertices can have up to K₇ = 7×6/2 = 21 edges. 10 edges is well within this limit."}]},{id:"t1",topic:"Graph Traversal",difficulty:"Medium",marks:2,question:"What data structure does BFS use, and what does DFS use?",options:[{text:"BFS uses a stack; DFS uses a queue",correct:!1,explanation:"Wrong — exactly backwards. BFS uses a QUEUE (FIFO — explores level by level). DFS uses a STACK (LIFO — or recursion, which IS an implicit stack)."},{text:"Both use a queue",correct:!1,explanation:"Wrong. Only BFS uses a queue. DFS uses a stack (or recursion)."},{text:"BFS uses a queue; DFS uses a stack (or recursion)",correct:!0,explanation:"✅ Correct! BFS: queue (FIFO) — dequeue a vertex, enqueue all unvisited neighbours → explores level by level. DFS: stack (LIFO) / recursion — go deep immediately → explores branch by branch."},{text:"Both use a stack",correct:!1,explanation:"Wrong. Only DFS uses a stack. BFS uses a queue to process neighbours in the order they were discovered."}]},{id:"t2",topic:"Graph Traversal",difficulty:"Hard",marks:3,question:"In Kruskal's MST algorithm, you are considering edge {A,D} with weight 5. The current tree T already contains edges {A,B}, {B,C}, {C,D}. What do you do?",options:[{text:"Add {A,D} — it connects two new components",correct:!1,explanation:"Wrong. A and D are already connected via the path A→B→C→D. Adding {A,D} would create a cycle: A→B→C→D→A. Kruskal's rule: skip any edge that creates a cycle."},{text:"Skip {A,D} — it would create a cycle",correct:!0,explanation:"✅ Correct! A and D are already connected in T: path A→B→C→D exists. Adding {A,D} would create cycle A→B→C→D→A. Kruskal's algorithm skips edges that would create cycles, regardless of weight."},{text:"Add {A,D} only if its weight is the minimum remaining edge",correct:!1,explanation:"Wrong. Even if {A,D} is the minimum remaining edge, it STILL gets skipped because it creates a cycle. Weight is irrelevant for the cycle check."},{text:"Remove the highest-weight edge in the cycle and add {A,D}",correct:!1,explanation:"Wrong. Kruskal's is a pure greedy algorithm — it never removes previously added edges. Simply skip {A,D} and move to the next edge."}]},{id:"t3",topic:"Graph Traversal",difficulty:"Medium",marks:2,question:"What is the key difference between a Euler circuit and a Hamilton circuit?",options:[{text:"Euler visits every VERTEX exactly once; Hamilton visits every EDGE exactly once",correct:!1,explanation:"Wrong — exactly backwards. Euler visits every EDGE exactly once. Hamilton visits every VERTEX exactly once."},{text:"Euler visits every EDGE exactly once; Hamilton visits every VERTEX exactly once",correct:!0,explanation:"✅ Correct! Euler circuit: traverses every EDGE exactly once (returns to start). Hamilton circuit: visits every VERTEX exactly once (returns to start). Condition for Euler: every vertex has even degree. Hamilton: much harder to determine (NP-complete in general)."},{text:"Both visit every vertex and every edge exactly once",correct:!1,explanation:"Wrong. They are different concepts. Euler: every edge once (may revisit vertices). Hamilton: every vertex once (may skip edges)."},{text:"There is no difference — they are the same concept",correct:!1,explanation:"Wrong. They are fundamentally different. Euler is about edges; Hamilton is about vertices. A graph can have one without the other."}]},{id:"c1",topic:"Graph Colouring",difficulty:"Medium",marks:2,question:"What is χ(C₆) — the chromatic number of the 6-cycle?",options:[{text:"2",correct:!0,explanation:"✅ Correct! C₆ has 6 vertices — an EVEN number. Even cycles are bipartite (no odd cycles), so they are 2-colourable. Colour alternating vertices: 1-2-1-2-1-2 around the cycle. Works perfectly since 6 is even and the last vertex (colour 2) connects to the first (colour 1)."},{text:"3",correct:!1,explanation:"Wrong. χ=3 applies to cycles with ODD number of vertices (C₃,C₅,C₇,...). C₆ has 6 vertices (EVEN), making it bipartite and 2-colourable."},{text:"6",correct:!1,explanation:"Wrong. χ=6 would mean every vertex needs a different colour — that's only for complete graphs where everyone is adjacent. In C₆ each vertex only has 2 neighbours."},{text:"4",correct:!1,explanation:"Wrong. 4 is the Four Colour Theorem upper bound for planar graphs. C₆ only needs 2 colours."}]},{id:"c2",topic:"Graph Colouring",difficulty:"Hard",marks:3,question:"A scheduling problem: 5 committee meetings must be scheduled. Two meetings conflict if they share a member. The conflict graph has χ = 3. What does this tell you?",options:[{text:"At least 5 time slots are needed",correct:!1,explanation:"Wrong. The chromatic number χ = 3 means 3 colours suffice. In scheduling, colours = time slots. So 3 time slots are enough."},{text:"Exactly 3 time slots are needed — the minimum",correct:!0,explanation:"✅ Correct! The chromatic number χ(G) = MINIMUM number of colours needed. In scheduling, colours = time slots. χ = 3 means: (a) 3 time slots are sufficient to schedule all committees without conflicts, and (b) 2 time slots are NOT sufficient (that would require χ ≤ 2). This is exactly how graph colouring applies to scheduling."},{text:"3 committee meetings cannot be held simultaneously",correct:!1,explanation:"Wrong interpretation. χ=3 means you need 3 different time slots (colour classes). Some meetings in different time slots can be held simultaneously — those are in the same colour class."},{text:"The graph has exactly 3 edges",correct:!1,explanation:"Wrong. χ=3 tells you about colour requirements, not edge count. A triangle (K₃) has χ=3 and 3 edges, but many other graphs also have χ=3 with different edge counts."}]},{id:"i1",topic:"Induction",difficulty:"Medium",marks:2,question:"In mathematical induction, the BASIS STEP is:",options:[{text:"Assuming P(k) to prove P(k+1)",correct:!1,explanation:"Wrong. That is the INDUCTIVE STEP (or more precisely, the use of the inductive hypothesis within the inductive step). The basis step is completely separate."},{text:"Proving P(n₀) directly for the initial value n₀",correct:!0,explanation:'✅ Correct! The basis step directly verifies that the proposition holds for the initial value (usually n=0 or n=1). This is the "first domino falls" part — no assumptions, just direct verification by substitution.'},{text:"Concluding that P(n) holds for all n",correct:!1,explanation:"Wrong. That is the CONCLUSION — the final statement after completing both the basis and inductive steps. The conclusion follows from the principle of induction, not from any direct verification."},{text:"Showing the proposition is true for n=k+1 assuming P(k)",correct:!1,explanation:"Wrong. That describes the INDUCTIVE STEP (assuming P(k) to derive P(k+1)). The basis step is earlier and simpler — directly verify P(n₀) without any assumptions."}]},{id:"i2",topic:"Induction",difficulty:"Hard",marks:3,question:"To prove 3ⁿ − 1 is divisible by 2 for all n≥1, the key move in the inductive step is:",options:[{text:"3^(k+1)−1 = 3·3^k − 1 = (3^k−1) + 2·3^k",correct:!0,explanation:"✅ Correct! This is the elegant algebraic trick. 3^(k+1)−1 = 3·3^k − 1. Rewrite as: 2·3^k + (3^k−1). First part 2·3^k is EVEN (divisible by 2). Second part (3^k−1) is EVEN by the inductive hypothesis. Even + Even = Even. Therefore 3^(k+1)−1 is divisible by 2. ✓"},{text:"3^(k+1) = 3^k + 3^k + 3^k, each term minus 1/3",correct:!1,explanation:"Wrong. This algebraic manipulation doesn't work cleanly. The correct approach: 3^(k+1)−1 = 3·3^k−1 = 2·3^k + (3^k−1), then apply the hypothesis to (3^k−1)."},{text:"Assume 3^(k+1)−1 is divisible by 2, then prove 3^k−1 is too",correct:!1,explanation:"Wrong direction. Induction goes FORWARD: assume P(k), prove P(k+1). You cannot assume P(k+1) to prove P(k) — that's circular reasoning."},{text:"Note that 3^(k+1) is always odd, so 3^(k+1)−1 is always even",correct:!1,explanation:"This reasoning is actually correct (odd minus 1 = even), but it proves the result WITHOUT using induction. The question asks for the inductive step approach."}]},{id:"i3",topic:"Induction",difficulty:"Hard",marks:3,question:"Why might you use STRONG induction instead of weak induction?",options:[{text:"Strong induction is more powerful and can prove more theorems",correct:!1,explanation:"Wrong. Strong and weak induction are EQUIVALENT in power — any theorem provable by one is provable by the other (though the proof may look different). The choice is about convenience."},{text:"Some proofs require cases P(j) for j < k (not just P(k)) to establish P(k+1)",correct:!0,explanation:"✅ Correct! Classic example: Fibonacci sequence properties, prime factorisation (Fundamental Theorem of Arithmetic). To show k+1 has property P, you may need P(a) and P(b) where a,b < k+1 (not just k). Strong induction lets you assume all P(0), P(1), ..., P(k) — giving you the full history to work with."},{text:"Weak induction requires n to start from 1, but strong induction can start from any n₀",correct:!1,explanation:"Wrong. Both can start from any base value n₀. The difference is what you ASSUME in the inductive step — strong assumes all previous cases, weak assumes only the immediately preceding case."},{text:"Strong induction requires only one base case, making it simpler",correct:!1,explanation:"Wrong. Strong induction sometimes requires MULTIPLE base cases (e.g. Fibonacci needs f(0) and f(1) as base cases). It's not simpler — it's used when the proof REQUIRES access to earlier cases."}]},{id:"f1",topic:"Functions",difficulty:"Medium",marks:2,question:"f: ℝ→ℝ defined by f(x) = x² is:",options:[{text:"Bijective",correct:!1,explanation:"Wrong. Not injective (f(2)=f(−2)=4, two inputs map to same output) and not surjective (−1 has no pre-image since x²≥0). A bijection requires both properties."},{text:"Injective but not surjective",correct:!1,explanation:"Wrong. f(x)=x² is NOT injective: f(3)=9=f(−3) but 3≠−3. Two different inputs give the same output."},{text:"Neither injective nor surjective",correct:!0,explanation:"✅ Correct! Not injective: f(2)=f(−2)=4 (two inputs → same output). Not surjective: no real x satisfies x²=−1 (range is only [0,∞), not all of ℝ). Therefore f(x)=x² with domain and codomain ℝ is neither."},{text:"Surjective but not injective",correct:!1,explanation:"Wrong. Not surjective either — negative reals are in the codomain but not in the range (x²≥0 always). So f is neither injective nor surjective."}]},{id:"f2",topic:"Functions",difficulty:"Hard",marks:3,question:"f(x)=7x−4 and g(x)=3x. What is (f∘g)(x)?",options:[{text:"21x − 4",correct:!0,explanation:"✅ Correct! (f∘g)(x) = f(g(x)). Apply g FIRST: g(x)=3x. Then apply f: f(3x) = 7(3x)−4 = 21x−4. Remember: ∘ means right-to-left — f∘g means apply g first, then f. This is Dr. O's exact example from the slides!"},{text:"21x − 12",correct:!1,explanation:"Wrong. That is (g∘f)(x) = g(f(x)) = g(7x−4) = 3(7x−4) = 21x−12. You applied the functions in the WRONG order. f∘g means g first, then f."},{text:"7x² − 4",correct:!1,explanation:"Wrong. That would mix the functions incorrectly. (f∘g)(x) = f(g(x)) = f(3x) = 7(3x)−4 = 21x−4."},{text:"3(7x−4)",correct:!1,explanation:"Wrong. That is (g∘f)(x) = g(f(x)) = 3(7x−4) = 21x−12. Wrong order."}]},{id:"f3",topic:"Functions",difficulty:"Hard",marks:3,question:"Which relation R on ℤ is an equivalence relation?",options:[{text:"R = {(a,b) | a > b}",correct:!1,explanation:"Fails reflexive (a>a is false) and symmetric (a>b does not imply b>a). Not an equivalence relation."},{text:"R = {(a,b) | a + b is even}",correct:!0,explanation:"✅ Correct! Reflexive: a+a=2a is even ✓. Symmetric: if a+b even then b+a=a+b even ✓. Transitive: a+b even and b+c even → a+b+b+c even → a+c+2b even → a+c even ✓. All three properties hold!"},{text:"R = {(a,b) | a divides b}",correct:!1,explanation:"Not symmetric: 2|6 but 6∤2. This is a partial ORDER (reflexive, antisymmetric, transitive), not an equivalence relation."},{text:"R = {(a,b) | |a−b| ≤ 1}",correct:!1,explanation:"Not transitive: |1−2|≤1 and |2−3|≤1, but |1−3|=2>1. Fails transitivity."}]},{id:"r1",topic:"Recursion",difficulty:"Medium",marks:2,question:"f(0)=3, f(n+1)=2f(n)+3. What is f(3)?",options:[{text:"21",correct:!1,explanation:"Wrong. f(0)=3, f(1)=9, f(2)=21 — you stopped at f(2). One more step: f(3)=2(21)+3=45."},{text:"45",correct:!0,explanation:"✅ Correct! f(0)=3 → f(1)=2(3)+3=9 → f(2)=2(9)+3=21 → f(3)=2(21)+3=45. Dr. O's exact example from the slides! Sequence: 3,9,21,45,93,..."},{text:"93",correct:!1,explanation:"Wrong. 93=f(4). You computed one step too far: f(3)=45, then f(4)=2(45)+3=93."},{text:"24",correct:!1,explanation:"Wrong. 24=4! (factorial of 4). The recursion here is f(n+1)=2f(n)+3, not factorial."}]},{id:"r2",topic:"Recursion",difficulty:"Hard",marks:3,question:'The recursively defined set S: "3∈S" and "if x,y∈S then x+y∈S" equals:',options:[{text:"All positive integers",correct:!1,explanation:"Wrong. From 3, repeated addition gives only multiples of 3: 3, 3+3=6, 3+6=9, 6+6=12... You can never reach 1, 2, 4, 5, 7, 8, etc."},{text:"All positive multiples of 3: {3, 6, 9, 12, ...}",correct:!0,explanation:"✅ Correct! From 3, every sum of elements gives another multiple of 3 (since 3a+3b=3(a+b)). And every multiple of 3 can be reached: 3k = 3+3+...+3 (k times). So S = {3,6,9,12,...} exactly."},{text:"All even positive integers",correct:!1,explanation:"Wrong. 3 is odd, 3+3=6 (even), 3+6=9 (odd), 3+9=12 (even)... The set contains both odd and even numbers. The defining property is divisibility by 3."},{text:"{3, 6, 9} only",correct:!1,explanation:"Wrong. The rule allows building arbitrarily large elements: 9+9=18, 12+12=24, etc. The set is infinite: all positive multiples of 3."}]},{id:"r3",topic:"Recursion",difficulty:"Medium",marks:2,question:"What are the TWO base cases for the Fibonacci sequence f(0)=0, f(1)=1?",options:[{text:"f(0)=0 and f(1)=1, because each term depends on the TWO previous terms",correct:!0,explanation:'✅ Correct! f(n)=f(n−1)+f(n−2) depends on two previous values. To "bottom out," you need two base cases — one for each. With only f(0), you cannot compute f(1) since f(1)=f(0)+f(−1) and f(−1) is undefined.'},{text:"f(0)=0 only — f(1) is computed from f(0)",correct:!1,explanation:"Wrong. f(1)=f(0)+f(−1). Since f(−1) is undefined (domain is non-negative integers), you cannot compute f(1) from f(0) alone. You MUST define f(1) as a separate base case."},{text:"f(1)=1 only — f(0) follows from f(1)",correct:!1,explanation:"Wrong. f(0) would require f(−1) and f(−2) — undefined. You need both f(0) and f(1) as independent base cases."},{text:"Any single base case works for Fibonacci",correct:!1,explanation:"Wrong. Because the Fibonacci recurrence f(n)=f(n−1)+f(n−2) reaches back TWO steps, you need exactly TWO base cases to prevent the recursion from going into undefined territory."}]},{id:"m1",topic:"Modular Arithmetic",difficulty:"Medium",marks:2,question:"What time does a 12-hour clock show 80 hours after 11:00?",options:[{text:"3:00",correct:!1,explanation:"Wrong. (11+80) mod 12 = 91 mod 12. 91÷12=7 remainder 7. Answer: 7:00."},{text:"7:00",correct:!0,explanation:"✅ Correct! (11+80) mod 12 = 91 mod 12. 91 = 7×12 + 7. So 91 mod 12 = 7. The clock reads 7:00. Shortcut: 80 hours = 6×12 + 8, so add 8 hours to 11:00 → 19:00 → 7:00."},{text:"11:00",correct:!1,explanation:"Wrong. 80 hours = 6 full days + 8 hours. (11+8) mod 12 = 19 mod 12 = 7, not 11."},{text:"1:00",correct:!1,explanation:"Wrong. (11+80) mod 12 = 91 mod 12 = 7. Not 1."}]},{id:"m2",topic:"Modular Arithmetic",difficulty:"Hard",marks:3,question:"Which is NOT necessarily preserved when a ≡ b (mod m)?",options:[{text:"a + c ≡ b + c (mod m)",correct:!1,explanation:"This IS preserved. From the theorem: a≡b(mod m) and c≡c(mod m) → a+c≡b+c(mod m). Addition is always preserved."},{text:"a × c ≡ b × c (mod m)",correct:!1,explanation:"This IS preserved. The multiplication part of the theorem guarantees ac≡bc(mod m) whenever a≡b(mod m)."},{text:"a/c ≡ b/c (mod m)",correct:!0,explanation:"✅ Correct! Division is NOT necessarily preserved. Example: 2≡8(mod 6), but 2/2=1 and 8/2=4, and 1≢4(mod 6). Congruences can be divided only under special conditions (when gcd(c,m)=1). This is a critical trap in modular arithmetic!"},{text:"aⁿ ≡ bⁿ (mod m) for positive integer n",correct:!1,explanation:"This IS preserved. By repeated application of the multiplication rule: a≡b → a²≡b² → a³≡b³ → ... → aⁿ≡bⁿ(mod m). Powers preserve congruence."}]},{id:"m3",topic:"Modular Arithmetic",difficulty:"Medium",marks:2,question:"Is 46 ≡ 68 (mod 11)? How is this verified?",options:[{text:"No — 46 and 68 are different numbers",correct:!1,explanation:"Wrong. Congruence ≠ equality. a≡b(mod m) means m|(a−b), not a=b. 46 and 68 ARE different but they are congruent mod 11."},{text:"Yes — 11 divides (46 − 68) = −22",correct:!0,explanation:"✅ Correct! From slide 4 exactly. 46−68=−22=11×(−2). Since 11|−22, we have 46≡68(mod 11). Equivalently: 46 mod 11=2 and 68 mod 11=2 — same remainder confirms congruence."},{text:"Yes — 46 + 68 = 114 is divisible by 11",correct:!1,explanation:"Wrong method. We check if 11|(a−b), not (a+b). Coincidentally 114=11×... let's check: 114÷11=10.36... not divisible. Wrong method AND wrong calculation."},{text:"No — 46 mod 11 ≠ 68 mod 11",correct:!1,explanation:"Wrong. 46 mod 11 = 2 (46=4×11+2). 68 mod 11 = 2 (68=6×11+2). They ARE equal mod 11, so 46≡68(mod 11) is TRUE."}]},{id:"h1",topic:"Huffman Coding",difficulty:"Medium",marks:2,question:"Characters with frequencies: A=5, B=2, C=1, D=3. After sorting and first merge, which two are merged?",options:[{text:"A and D (highest frequencies)",correct:!1,explanation:"Wrong. Huffman always merges the TWO LOWEST frequency nodes first. A(5) and D(3) are high-frequency — they are merged last."},{text:"C and B (lowest frequencies: 1 and 2)",correct:!0,explanation:"✅ Correct! Sort ascending: C(1) < B(2) < D(3) < A(5). Take the two smallest: C(1) and B(2). Merge to create parent CB(3). New queue: CB(3), D(3), A(5). Then merge CB(3)+D(3)=CBD(6), finally CBD(6)+A(5)=root(11)."},{text:"B and D (middle frequencies)",correct:!1,explanation:"Wrong. The rule is always take the TWO MINIMUM frequency nodes from the priority queue. C(1) is smaller than B(2), so C comes first, then B — not B and D."},{text:"All four are merged simultaneously",correct:!1,explanation:"Wrong. Huffman builds the tree iteratively — exactly TWO nodes are merged per step, creating one new parent. Never more than two at once."}]},{id:"h2",topic:"Huffman Coding",difficulty:"Hard",marks:3,question:"After building a Huffman tree, decoding is done by:",options:[{text:"Reading fixed-size groups of bits and looking up a table",correct:!1,explanation:"Wrong. That describes fixed-length codes (like ASCII). Huffman decoding uses the tree structure because codes have VARIABLE lengths."},{text:"Starting at the root: 0=go left, 1=go right; output character when a leaf is reached, reset to root",correct:!0,explanation:"✅ Correct! Huffman decoding: start at root, read each bit (0→left, 1→right). When you reach a LEAF: output that character, return to ROOT, continue reading. The prefix-free property guarantees no ambiguity — when a leaf is reached, the current character is complete."},{text:"Reversing the encoding process by reading bits backwards",correct:!1,explanation:"Wrong. Bits are read LEFT-TO-RIGHT (same direction as encoding). Reading backwards would give wrong results. The tree structure handles unambiguous decoding without reversal."},{text:"Using the character frequencies to reconstruct which bits belong to which character",correct:!1,explanation:"Wrong. Frequencies are used to BUILD the tree, but decoding uses the tree structure itself. You traverse the tree with each bit — frequencies are not consulted during decoding."}]},{id:"h3",topic:"Huffman Coding",difficulty:"Medium",marks:2,question:"Huffman coding is described as a GREEDY algorithm because:",options:[{text:"It always uses the minimum number of bits overall",correct:!1,explanation:'Partially true (it IS optimal) but not the definition of greedy. "Greedy" refers to the STRATEGY, not the outcome.'},{text:"At each step it merges the two nodes with MINIMUM frequency — making the locally optimal choice",correct:!0,explanation:"✅ Correct! A greedy algorithm makes the locally optimal choice at each step without reconsidering earlier decisions. Huffman always merges the two smallest-frequency nodes at each step. Remarkably, this local greedy strategy leads to the GLOBALLY optimal prefix-free code."},{text:"It greedily assigns the shortest codes to all characters",correct:!1,explanation:"Wrong description. Greedy algorithms make locally optimal choices step by step. Huffman's greedy choice is which two nodes to merge, not how to assign codes. Codes are determined by tree structure after all merges are done."},{text:"It runs faster than any other compression algorithm",correct:!1,explanation:'Wrong. "Greedy" is a design paradigm (make locally optimal choices), not a speed characteristic. Many non-greedy algorithms are also fast.'}]}],go=[...new Set($n.map(e=>e.topic))];function up(e,t,n){const[i,o]=P.useState(n),s=P.useRef(null);return P.useEffect(()=>{if(o(n),!e){clearInterval(s.current);return}return s.current=setInterval(()=>{o(a=>a<=1?(clearInterval(s.current),t(),0):a-1)},1e3),()=>clearInterval(s.current)},[e,n]),i}function fp({questions:e,onFinish:t}){var v,w;const[n,i]=P.useState(0),[o,s]=P.useState(null),[a,d]=P.useState(!1),[c,u]=P.useState([]),[p,f]=P.useState(!1),h=e[n],y=h.difficulty==="Hard"?45:h.difficulty==="Medium"?30:20,S=up(!a,()=>{a||(f(!0),m(null))},y),R=Math.max(0,S/y*100),x=S>y*.5?l.green:S>y*.25?l.gold:l.red,m=T=>{if(a)return;s(T),d(!0);const E=T!==null&&h.options[T].correct;u(A=>[...A,{q:h,selected:T,correct:E}])},g=()=>{if(n+1>=e.length){t(c);return}i(T=>T+1),s(null),d(!1),f(!1)};return r.jsxs("div",{style:{animation:"fadeUp .3s ease"},children:[r.jsxs("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16},children:[r.jsxs("span",{style:{fontSize:12,color:l.muted},children:["Q",n+1," of ",e.length]}),r.jsxs("div",{style:{display:"flex",gap:8},children:[r.jsx("span",{style:{padding:"3px 10px",borderRadius:100,fontSize:11,fontWeight:600,background:`${{Easy:l.green,Medium:l.gold,Hard:l.red}[h.difficulty]}22`,color:{Easy:l.green,Medium:l.gold,Hard:l.red}[h.difficulty]},children:h.difficulty}),r.jsx("span",{style:{padding:"3px 10px",borderRadius:100,fontSize:11,fontWeight:600,background:`${hn[h.topic]|
