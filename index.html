orously, not just observe a pattern."]}),i.jsx("h2",{style:k,children:"6.3 The Principle of Mathematical Induction (Slides 15-16)"}),i.jsxs(fe,{children:["Imagine an ",i.jsx("strong",{children:"infinite row of dominoes"}),". You want to prove ALL of them fall. You can't push each one individually — there are infinitely many!",i.jsx("br",{}),i.jsx("br",{}),"Your strategy: prove just TWO things:",i.jsx("br",{}),i.jsx("strong",{children:"1."})," The FIRST domino falls. (Basis step)",i.jsx("br",{}),i.jsx("strong",{children:"2."})," Whenever ANY domino falls, the NEXT one falls too. (Inductive step)",i.jsx("br",{}),i.jsx("br",{}),"If both are true → ALL dominoes fall forever. That's mathematical induction."]}),i.jsx(F,{lang:"the principle — from slide 16",children:`To prove P(n) for ALL n ∈ ℕ:
